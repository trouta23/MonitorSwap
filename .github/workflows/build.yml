name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish -r win-x64 -c Release -o publish

      - name: Bundle NirCmd
        run: |
          Invoke-WebRequest -Uri "https://www.nirsoft.net/utils/nircmd-x64.zip" -OutFile nircmd.zip
          Expand-Archive nircmd.zip -DestinationPath nircmd
          Copy-Item nircmd/nircmd.exe publish/

      - name: Package
        run: Compress-Archive -Path publish/* -DestinationPath MonitorSwap.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: MonitorSwap.zip
          generate_release_notes: true
